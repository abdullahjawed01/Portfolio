<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lolo — Launching Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14121B;
    --bg-2:#1C1926;
    --pink:#FF4D6D;
    --yellow:#FFE066;
    --text:#F5F2F7;
    --muted:#8B8598;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    position:relative;
  }
 
  .blob{
    position:absolute;
    width:60vw;
    height:60vw;
    max-width:700px;
    max-height:700px;
    border-radius:50%;
    background:radial-gradient(circle at 30% 30%, rgba(255,77,109,0.35), transparent 60%);
    filter:blur(60px);
    top:-10%;
    left:-10%;
    animation:drift 14s ease-in-out infinite alternate;
  }
  .blob.two{
    background:radial-gradient(circle at 60% 60%, rgba(255,224,102,0.22), transparent 60%);
    top:auto;
    left:auto;
    bottom:-15%;
    right:-10%;
    animation-delay:2s;
    animation-duration:18s;
  }
  @keyframes drift{
    0%{transform:translate(0,0) scale(1);}
    100%{transform:translate(4%,6%) scale(1.08);}
  }
 
  .wrap{
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    padding:2rem 1.5rem;
    max-width:560px;
    width:100%;
  }
 
  .eyebrow{
    font-size:0.8rem;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:1.75rem;
    display:flex;
    align-items:center;
    gap:0.6rem;
  }
  .eyebrow::before,
  .eyebrow::after{
    content:"";
    width:22px;
    height:1px;
    background:var(--muted);
  }
 
  .wordmark{
    display:flex;
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:clamp(4rem, 16vw, 8rem);
    line-height:1;
    letter-spacing:-0.02em;
    margin-bottom:1.75rem;
  }
  .wordmark span{
    display:inline-block;
    animation:bounce 2.4s ease-in-out infinite;
  }
  .wordmark span:nth-child(1){color:var(--pink); animation-delay:0s;}
  .wordmark span:nth-child(2){color:var(--text); animation-delay:0.12s;}
  .wordmark span:nth-child(3){color:var(--yellow); animation-delay:0.24s;}
  .wordmark span:nth-child(4){color:var(--text); animation-delay:0.36s;}
  @keyframes bounce{
    0%, 40%, 100%{transform:translateY(0);}
    20%{transform:translateY(-16px);}
  }
 
  .tagline{
    font-size:1.05rem;
    color:var(--muted);
    line-height:1.6;
    margin-bottom:2.25rem;
    max-width:400px;
  }
  .tagline strong{
    color:var(--text);
    font-weight:500;
  }
 
  form{
    display:flex;
    width:100%;
    max-width:400px;
    gap:0.6rem;
    margin-bottom:1.5rem;
  }
  input[type="email"]{
    flex:1;
    min-width:0;
    background:var(--bg-2);
    border:1px solid rgba(245,242,247,0.12);
    border-radius:999px;
    padding:0.85rem 1.25rem;
    color:var(--text);
    font-family:'Inter', sans-serif;
    font-size:0.95rem;
    outline:none;
    transition:border-color 0.2s ease;
  }
  input[type="email"]::placeholder{color:var(--muted);}
  input[type="email"]:focus{border-color:var(--pink);}
 
  button{
    background:var(--pink);
    color:#2A0A12;
    border:none;
    border-radius:999px;
    padding:0.85rem 1.5rem;
    font-family:'Inter', sans-serif;
    font-weight:500;
    font-size:0.95rem;
    cursor:pointer;
    white-space:nowrap;
    transition:transform 0.15s ease, background 0.2s ease;
  }
  button:hover{background:#ff6580;}
  button:active{transform:scale(0.96);}
 
  .note{
    font-size:0.8rem;
    color:var(--muted);
  }
  .note.success{
    color:var(--yellow);
    display:none;
  }
 
  .socials{
    display:flex;
    gap:1.25rem;
    margin-top:2.5rem;
  }
  .socials a{
    color:var(--muted);
    text-decoration:none;
    font-size:0.85rem;
    letter-spacing:0.02em;
    border-bottom:1px solid transparent;
    transition:color 0.2s ease, border-color 0.2s ease;
  }
  .socials a:hover{
    color:var(--text);
    border-color:var(--text);
  }
 
  @media (max-width:480px){
    form{flex-direction:column;}
    button{width:100%;}
  }
 
  @media (prefers-reduced-motion: reduce){
    .wordmark span, .blob{animation:none;}
  }
</style>
</head>
<body>
 
  <div class="blob"></div>
  <div class="blob two"></div>
 
  <div class="wrap">
    <p class="eyebrow">Launching soon</p>
 
    <h1 class="wordmark" aria-label="Lolo">
      <span aria-hidden="true">L</span><span aria-hidden="true">o</span><span aria-hidden="true">l</span><span aria-hidden="true">o</span>
    </h1>
 
    <p class="tagline">A marketing agency built to make brands impossible to scroll past. <strong>We're mid-launch</strong> — leave your email and we'll let you know the second the doors open.</p>
 
    <form id="notify-form">
      <input type="email" id="email-input" placeholder="you@company.com" required aria-label="Email address">
      <button type="submit">Notify me</button>
    </form>
    <p class="note" id="note">We'll only email you once. Promise.</p>
    <p class="note success" id="note-success">You're on the list. See you soon.</p>
 
    <div class="socials">
      <a href="#" onclick="return false;">Instagram</a>
      <a href="#" onclick="return false;">LinkedIn</a>
      <a href="#" onclick="return false;">X</a>
    </div>
  </div>
 
<script>
  document.getElementById('notify-form').addEventListener('submit', function(e){
    e.preventDefault();
    document.getElementById('note').style.display = 'none';
    document.getElementById('note-success').style.display = 'block';
    document.getElementById('email-input').value = '';
  });
</script>
 
</body>
</html>
